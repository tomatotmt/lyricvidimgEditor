<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lyric Video Editor Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Anton&family=BIZ+UDGothic:wght@400;700&family=BIZ+UDMincho&family=BIZ+UDPGothic:wght@400;700&family=BIZ+UDPMincho&family=Bangers&family=Bebas+Neue&family=Caveat:wght@400;700&family=Cinzel:wght@400;700&family=Darumadrop+One&family=Dancing+Script:wght@400;700&family=Dela+Gothic+One&family=DotGothic16&family=Hina+Mincho&family=Inter:wght@400;700;900&family=Kaisei+Decol:wght@400;700&family=Kaisei+HarunoUmi:wght@400;700&family=Kaisei+Opti:wght@400;700&family=Kaisei+Tokumin:wght@400;700&family=Kiwi+Maru:wght@400;700&family=Klee+One:wght@400;600&family=Kosugi&family=Kosugi+Maru&family=M+PLUS+1:wght@400;700;900&family=M+PLUS+1p:wght@400;700;900&family=M+PLUS+2:wght@400;700;900&family=M+PLUS+Rounded+1c:wght@400;700;900&family=Mochiy+Pop+One&family=Mochiy+Pop+P+One&family=Montserrat:wght@400;700;900&family=New+Tegomin&family=Noto+Sans+JP:wght@400;700;900&family=Noto+Serif+JP:wght@400;700;900&family=Orbitron:wght@400;700;900&family=Oswald:wght@400;700&family=Permanent+Marker&family=Playfair+Display:wght@400;700;900&family=Poppins:wght@400;700;900&family=Raleway:wght@400;700;900&family=Rampart+One&family=Reggae+One&family=Roboto:wght@400;700;900&family=RocknRoll+One&family=Sawarabi+Gothic&family=Sawarabi+Mincho&family=Shippori+Antique&family=Shippori+Antique+B1&family=Shippori+Mincho:wght@400;700&family=Shippori+Mincho+B1:wght@400;700&family=Stick&family=Train+One&family=Yusei+Magic&family=Zen+Antique&family=Zen+Antique+Soft&family=Zen+Kaku+Gothic+Antique:wght@400;700;900&family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Zen+Kurenaido&family=Zen+Maru+Gothic:wght@400;700;900&family=Zen+Old+Mincho:wght@400;700;900&family=Zen+Tokyo+Zoo&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <link href="https://fonts.googleapis.com/css2?family=Astloch:wght@400;700&family=Black+Ops+One&family=Bungee&family=Bungee+Hairline&family=Bungee+Inline&family=Bungee+Outline&family=Bungee+Shade&family=Butcherman&family=Codystar:wght@300;400&family=Creepster&family=Diplomata+SC&family=Eater&family=Faster+One&family=Frijole&family=Germania+One&family=Geostar&family=Geostar+Fill&family=Grenze+Gotisch:wght@400;700;900&family=Jacquard+12&family=Jacquard+12+Charted&family=Jersey+10&family=Jersey+15&family=Jersey+20&family=Jersey+25+Charted&family=Lacquer&family=Libre+Barcode+39&family=Metal+Mania&family=Monofett&family=Monoton&family=Nosifer&family=Pirata+One&family=Pixelify+Sans:wght@400;700&family=Plaster&family=Press+Start+2P&family=Rubik+Beastly&family=Rubik+Broken+Fax&family=Rubik+Burned&family=Rubik+Dirt&family=Rubik+Glitch&family=Rubik+Glitch+Pop&family=Rubik+Iso&family=Rubik+Maze&family=Rubik+Microbe&family=Rubik+Moonrocks&family=Rubik+Puddles&family=Rubik+Spray+Paint&family=Rubik+Vinyl&family=Rubik+Wet+Paint&family=Special+Elite&family=Wallpoet&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <style>
    :root {
      --bg: #0b0c10;
      --panel: rgba(22,24,30,.92);
      --panel-2: #12131a;
      --line: rgba(255,255,255,.1);
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #3b82f6;
      --danger: #ef4444;
      --ok: #10b981;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Noto Sans JP", "Yu Gothic", Meiryo, system-ui, sans-serif;
    }
    button, input, select, textarea { font: inherit; }
    button { user-select: none; }
    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 8px minmax(340px, var(--right-panel-width, 380px));
      gap: 10px;
      height: 100vh;
      padding: 18px;
    }
    .left, .right { min-height: 0; }
    .left {
      display: grid;
      grid-template-rows: minmax(220px, var(--preview-height, 46vh)) auto 8px minmax(220px, 1fr) auto;
      gap: 12px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 10px 28px rgba(0,0,0,.28);
      min-height: 0;
    }
    .preview-panel {
      display: block;
      overflow: hidden;
    }
    .panel-title {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      min-width: 170px;
      height: 100%;
      padding: 8px 6px 8px 4px;
    }
    .stage-wrap {
      display: grid;
      grid-template-columns: minmax(160px, 180px) minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }
    .stage {
      position: relative;
      width: min(100%, calc((var(--preview-height, 46vh) - 28px) * 16 / 9));
      height: auto;
      max-width: 100%;
      aspect-ratio: 16 / 9;
      min-height: 120px;
      max-height: 100%;
      overflow: hidden;
      border-radius: 8px;
      background-color: #cfcfcf;
      background-image:
        linear-gradient(45deg, rgba(255,255,255,.32) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,.32) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,.32) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,.32) 75%);
      background-size: 32px 32px;
      background-position: 0 0, 0 16px, 16px -16px, -16px 0;
      box-shadow: 0 12px 40px rgba(0,0,0,.55);
    }
    .lyric {
      position: absolute;
      left: 50%;
      top: 50%;
      max-width: 92%;
      padding: .14em .32em;
      font-size: clamp(22px, 5vw, 64px);
      font-weight: 800;
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
      line-height: 1.14;
    }
    .stage.drag-enabled .lyric {
      pointer-events: auto;
      cursor: move;
    }
    .status {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      min-height: 34px;
      padding: 0 4px;
      color: var(--muted);
      font-size: 13px;
    }
    .status strong { color: var(--text); }
    label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .inline-label {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      margin: 0;
      letter-spacing: 0;
      text-transform: none;
      font-size: 12px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .btn, .icon-btn {
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 7px;
      background: #1f2937;
      color: var(--text);
      cursor: pointer;
      font-weight: 800;
    }
    .btn { padding: 9px 12px; }
    .icon-btn {
      width: 32px;
      height: 32px;
      display: inline-grid;
      place-items: center;
      line-height: 1;
    }
    .btn.primary { background: var(--accent); border-color: transparent; color: #fff; }
    .btn.danger { background: var(--danger); border-color: transparent; color: #fff; }
    .btn.ok { background: var(--ok); border-color: transparent; color: #fff; }
    .btn.warn { background: var(--warn); border-color: transparent; color: #fff; }
    .btn:disabled, .icon-btn:disabled { opacity: .35; cursor: default; }
    .timeline-panel {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 8px;
      background: var(--panel-2);
      overflow: hidden;
      min-height: 180px;
    }
    .vertical-splitter {
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(59,130,246,.65), transparent);
      cursor: row-resize;
      opacity: .55;
    }
    .vertical-splitter:hover,
    .vertical-splitter.dragging {
      opacity: 1;
      background: linear-gradient(90deg, transparent, rgba(59,130,246,1), transparent);
    }
    .horizontal-splitter {
      width: 8px;
      min-width: 8px;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(180deg, transparent, rgba(59,130,246,.45), transparent);
      cursor: col-resize;
      opacity: .55;
    }
    .horizontal-splitter:hover,
    .horizontal-splitter.dragging {
      opacity: 1;
      background: linear-gradient(180deg, transparent, rgba(59,130,246,1), transparent);
    }
    .timeline-top {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .timeline-top input[type="range"] { width: 120px; }
    .scroll-area {
      position: relative;
      overflow: auto;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px;
      background: #07080b;
    }
    .timeline-content {
      position: relative;
      min-height: 292px;
    }
    .ruler {
      position: sticky;
      top: 0;
      height: 26px;
      z-index: 9;
      background: #090a0e;
      border-bottom: 1px solid rgba(255,255,255,.08);
      color: #6b7280;
      font-size: 11px;
      font-weight: 800;
    }
    .tick {
      position: absolute;
      top: 0;
      height: 26px;
      border-left: 1px solid rgba(255,255,255,.08);
      padding-left: 4px;
      display: flex;
      align-items: center;
    }
    .waveform {
      position: relative;
      height: 42px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      background: rgba(255,255,255,.02);
    }
    .waveform canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .track {
      position: relative;
      height: 48px;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .track-label {
      position: sticky;
      left: 8px;
      top: 4px;
      z-index: 2;
      width: max-content;
      color: rgba(255,255,255,.32);
      font-size: 10px;
      font-weight: 900;
    }
    .playhead {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      z-index: 12;
      background: var(--danger);
      box-shadow: 0 0 8px var(--danger);
      pointer-events: none;
    }
    .block {
      position: absolute;
      top: 7px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      border-radius: 6px;
      border: 1px solid rgba(59,130,246,.65);
      background: linear-gradient(135deg, rgba(59,130,246,.36), rgba(37,99,235,.16));
      color: var(--text);
      font-size: 12px;
      cursor: grab;
      user-select: none;
    }
    .block.selected {
      border-color: #60a5fa;
      box-shadow: 0 0 0 1px rgba(96,165,250,.7), 0 0 14px rgba(59,130,246,.42);
      background: linear-gradient(135deg, rgba(59,130,246,.7), rgba(37,99,235,.45));
      font-weight: 800;
    }
    .resize-handle {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 9px;
      cursor: ew-resize;
      z-index: 3;
    }
    .resize-handle.start { left: 0; }
    .resize-handle.end { right: 0; }
    .resize-handle::after {
      content: "";
      position: absolute;
      top: 8px;
      bottom: 8px;
      left: 4px;
      width: 2px;
      border-radius: 2px;
      background: rgba(255,255,255,.6);
    }
    .keyframe-marker {
      position: absolute;
      top: 2px;
      width: 10px;
      height: 10px;
      z-index: 4;
      background: #f59e0b;
      border: 1px solid rgba(255,255,255,.85);
      transform: translateX(-50%) rotate(45deg);
      cursor: ew-resize;
      box-shadow: 0 0 8px rgba(245,158,11,.6);
    }
    .keyframe-marker.selected {
      background: #fff;
      border-color: #f59e0b;
    }
    .tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,.1);
      margin-bottom: 14px;
    }
    .tab {
      border: 0;
      border-bottom: 2px solid transparent;
      background: none;
      color: var(--muted);
      padding: 10px 14px;
      font-weight: 800;
      cursor: pointer;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .right .panel {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .tab-body {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-right: 4px;
    }
    input[type="text"], input[type="number"], select, textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 7px;
      background: rgba(0,0,0,.36);
      color: var(--text);
      padding: 8px 10px;
      outline: none;
    }
    input[type="color"] {
      width: 52px;
      height: 30px;
      padding: 2px;
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 4px;
      background: #e5e7eb;
    }
    input[type="range"] { width: 100%; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .section {
      border-top: 1px solid rgba(255,255,255,.06);
      padding-top: 12px;
    }
    h4 { margin: 0 0 10px; font-size: 13px; }
    .palette { display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0; }
    .swatch {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 1px solid #555;
      cursor: pointer;
    }
    .small-note { color: var(--muted); font-size: 12px; line-height: 1.55; }
    .font-picker {
      position: relative;
      display: grid;
      gap: 8px;
    }
    .font-current {
      width: 100%;
      min-height: 38px;
      text-align: left;
      padding: 8px 10px;
      border-radius: 7px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.36);
      color: var(--text);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .font-menu {
      display: none;
      max-height: 280px;
      overflow: auto;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 8px;
      background: #0d0f15;
      box-shadow: 0 16px 36px rgba(0,0,0,.45);
      z-index: 20;
    }
    .font-picker.open .font-menu { display: block; }
    .font-hover-preview {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,.1);
      background: #10141c;
      font-size: 24px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .font-option {
      width: 100%;
      border: 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
      background: transparent;
      color: var(--text);
      padding: 8px 10px;
      cursor: pointer;
      text-align: left;
      display: grid;
      grid-template-columns: minmax(120px, .9fr) minmax(180px, 1.3fr);
      gap: 10px;
      align-items: center;
    }
    .font-option:hover, .font-option.active {
      background: rgba(59,130,246,.18);
    }
    .effect-picker {
      position: relative;
    }
    .effect-current {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 9px 10px;
      color: var(--text);
      background: #111827;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      cursor: pointer;
    }
    .effect-menu {
      display: none;
      position: absolute;
      z-index: 40;
      left: 0;
      right: 0;
      top: calc(100% + 6px);
      padding: 8px;
      background: #0b1020;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 8px;
      box-shadow: 0 16px 36px rgba(0,0,0,.45);
    }
    .effect-picker.open .effect-menu {
      display: block;
    }
    .effect-hover-preview {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
      color: #fff;
      background: #05070b;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 8px;
      overflow: hidden;
      font-size: 24px;
      font-weight: 900;
    }
    .effect-options-scroll {
      max-height: 260px;
      overflow-y: auto;
      padding-right: 2px;
    }
    .effect-preview-text {
      display: inline-block;
      will-change: transform, opacity, filter;
    }
    .effect-option {
      width: 100%;
      padding: 8px 10px;
      color: #d1d5db;
      background: transparent;
      border: 0;
      border-radius: 6px;
      text-align: left;
      cursor: pointer;
    }
    .effect-option:hover, .effect-option.active {
      color: #fff;
      background: rgba(59,130,246,.18);
    }
    .font-sample {
      font-size: 18px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    @media (max-width: 980px) {
      body { overflow: auto; height: auto; }
      .app { grid-template-columns: 1fr; height: auto; min-height: 100vh; }
      .left { grid-template-rows: minmax(220px, 48vh) auto minmax(250px, 38vh) auto; }
      .vertical-splitter { display: none; }
      .horizontal-splitter { display: none; }
      .stage-wrap { grid-template-columns: 1fr; }
      .panel-title { min-width: 0; height: auto; flex-direction: row; }
      .right .panel { min-height: 680px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="left">
      <section class="panel preview-panel">
        <div class="stage-wrap">
          <div class="panel-title">
            <span>プレビュー (1920x1080 / 透明背景)</span>
            <span id="selectedLabel">未選択</span>
          </div>
          <div id="stage" class="stage"></div>
        </div>
      </section>

      <div class="status">
        <div>再生時間: <strong id="timeText">0.00s</strong> / <span id="durationText">10.00s</span></div>
        <div class="toolbar">
          <button id="undoButton" class="icon-btn" title="戻す (Ctrl+Z)">↶</button>
          <button id="redoButton" class="icon-btn" title="やり直す (Shift+Ctrl+Z)">↷</button>
          <button id="playButton" class="icon-btn" title="再生/停止">▶</button>
        </div>
        <label class="inline-label"><input id="previewDragToggle" type="checkbox">プレビュー上で文字をドラッグ</label>
        <div>フレーム: <strong id="frameText">0f</strong> / <span id="durationFrameText">300f</span></div>
      </div>

      <div id="verticalSplit" class="vertical-splitter" title="ドラッグしてプレビューとタイムラインの高さを調整"></div>

      <section class="panel timeline-panel">
        <div class="timeline-top">
          <div class="toolbar">
            <button id="addBottom" class="btn primary">+ 歌詞ブロック追加</button>
            <label class="inline-label"><input id="snapToggle" type="checkbox" checked>スナップ</label>
            <label class="inline-label">ズーム <input id="zoomRange" type="range" min="1" max="8" step=".5" value="2"></label>
          </div>
          <div class="small-note">本体ドラッグで移動 / 両端ドラッグで長さ調整 / Delで削除</div>
        </div>
        <div id="timelineScroll" class="scroll-area">
          <div id="timelineContent" class="timeline-content"></div>
        </div>
      </section>

      <audio id="audio" preload="metadata"></audio>
    </main>

    <div id="horizontalSplit" class="horizontal-splitter" title="ドラッグしてタイムラインと詳細パネルの幅を調整"></div>

    <aside class="right">
      <section class="panel">
        <nav class="tabs">
          <button class="tab active" data-tab="input">入力・共通</button>
          <button class="tab" data-tab="edit">編集</button>
          <button class="tab" data-tab="output">出力</button>
          <button class="tab" data-tab="help">使い方</button>
        </nav>
        <div id="tabBody" class="tab-body"></div>
      </section>
    </aside>
  </div>

  <script>
    const fps = 30;
    const stageW = 1920;
    const stageH = 1080;
    const colors = ['#ffffff','#000000','#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4'];
    const fontPreviewText = '文字もじモジMoji1234';
    const fontCatalog = [
      ['Noto Sans JP','JP','定番ゴシック / 高可読'],
      ['Noto Serif JP','JP','定番明朝 / 上品'],
      ['M PLUS 1','JP','現代的ゴシック'],
      ['M PLUS 1p','JP','丸みのあるゴシック'],
      ['M PLUS 2','JP','幾何学的ゴシック'],

        else if (block.textEffect === 'Exploded Word Rebuild' || block.textEffect === 'Scatter To Camera' || block.textEffect === 'Floating Caption Field') { x += Math.cos(local * .13) * (1 - entryProgress) * 260; y += Math.sin(local * .17) * (1 - entryProgress) * 180; rotation += (1 - entryProgress) * 540; extraTransform += ` perspective(900px) translateZ(${(1 - entryProgress) * -320}px)`; }
        else if (block.textEffect === 'Massive Word Eclipse') { scale *= 2.4; x += -500 + p3 * 900; extraTransform += ' perspective(900px) rotateY(10deg)'; }

    function drawWaveformLater(width) {
      requestAnimationFrame(() => {
        const canvas = document.getElementById('waveCanvas');
        if (!canvas) return;
        canvas.width = width;
        canvas.height = 42;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = 'rgba(59,130,246,.9)';
        ctx.beginPath();
        const mid = canvas.height / 2;
        if (!audioBufferData) {
          ctx.strokeStyle = 'rgba(255,255,255,.16)';
          ctx.moveTo(0, mid); ctx.lineTo(canvas.width, mid); ctx.stroke();
          return;
        }
        for (let x = 0; x < canvas.width; x++) {
          const start = Math.floor((x / canvas.width) * audioBufferData.length);
          const end = Math.floor(((x + 1) / canvas.width) * audioBufferData.length);
          let min = 1, max = -1;
          for (let i = start; i < end; i++) {
            const v = audioBufferData[i] || 0;
            if (v < min) min = v;
            if (v > max) max = v;

      lyrics = lyrics.map(l => {
        if (l.id !== selectedId) return l;
        const next = {...l, [key]: numeric.includes(key) ? Number(value) : value};
        next.startFrame = Math.max(0, Math.min(next.startFrame, next.endFrame - 1));
        next.endFrame = Math.max(next.startFrame + 1, next.endFrame);
        return next;
      });
      render();
    }
    function updateGlobal(key, value) {
      recordHistory();
      globalSettings[key] = value;
      render();
    }
    function addBlock() {
      recordHistory();
      const id = 'block-' + Date.now();
      lyrics.push(makeBlock(id, '新しい歌詞', 0, currentFrame, Math.min(duration(), currentFrame + 60), 0, 'None', globalSettings.textColor));
      selectedId = id;
      activeTab = 'edit';
      render();
    }
    function deleteSelectedLyric() {
      if (!selectedId) return;
      recordHistory();
      lyrics = lyrics.filter(l => l.id !== selectedId);
      selectedId = null;
      render();
    }
    function togglePlayback() {
      playing = !playing;
      const audio = document.getElementById('audio');
      if (playing) {
        syncAudioToFrame();
        if (audioFile) audio.play().catch(() => {});
      } else {
        audio.pause();
      }
      render();
    }
    function syncAudioToFrame() {
      const audio = document.getElementById('audio');
      if (audioFile && Math.abs(audio.currentTime - currentFrame / fps) > .08) audio.currentTime = currentFrame / fps;
    }
    setInterval(() => {
      if (!playing) return;
      const audio = document.getElementById('audio');
      currentFrame = audioFile ? Math.round(audio.currentTime * fps) : currentFrame + 1;
      if (currentFrame >= duration()) { playing = false; audio.pause(); currentFrame = duration(); }
      render();
    }, 1000 / fps);
    async function importAudio(e) {
      const file = e.target.files[0]; if (!file) return;
      recordHistory();
      const url = URL.createObjectURL(file);
      const audio = document.getElementById('audio');
      audio.src = url;
      audioFile = {name:file.name, url, duration:0};
      audio.onloadedmetadata = () => { audioFile.duration = audio.duration || 0; render(); };
      try {
        const data = await file.arrayBuffer();
        const ctx = new AudioContext();
        const buffer = await ctx.decodeAudioData(data.slice(0));
        audioBufferData = buffer.getChannelData(0);
        ctx.close();
      } catch (_) { audioBufferData = null; }
      render();
    }
    function importLrc(e) {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const parsed = [];
        let track = 0;
        String(reader.result).split('\n').forEach((line, i) => {
          const m = line.match(/\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/);
          if (!m || !m[4].trim()) return;
          const sec = Number(m[1]) * 60 + Number(m[2]) + Number(m[3]) / (m[3].length === 3 ? 1000 : 100);
          const start = Math.round(sec * fps);
          parsed.push({...makeBlock('lrc-' + i, m[4].trim(), track, start, start + 90, 0, 'Pop', globalSettings.textColor), font: globalSettings.font, textEffect: globalSettings.textEffect});
          track = (track + 1) % 10;
        });
        if (parsed.length) {
          recordHistory();
          lyrics = parsed;
          selectedId = null;
          render();
        }
      };
      reader.readAsText(file);
    }
    function exportProjectJson() {
      const blob = new Blob([JSON.stringify({lyrics, globalSettings}, null, 2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'lyric-project.json';
      a.click();
      URL.revokeObjectURL(url);
    }
    function importProjectJson(e) {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        recordHistory();
        const data = JSON.parse(reader.result);
        if (Array.isArray(data.lyrics)) lyrics = data.lyrics;
        if (data.globalSettings) globalSettings = {...globalSettings, ...data.globalSettings};
        selectedId = null;
        render();
      };
      reader.readAsText(file);
    }
    function options(list, selected) {
      return list.map(v => `<option value="${escapeHtml(v)}" ${v === selected ? 'selected' : ''}>${escapeHtml(v)}</option>`).join('');
    }
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function isEditableTarget(target) {
      return !!target?.closest?.('input, textarea, select, [contenteditable="true"]');
    }
    document.addEventListener('keydown', e => {
      const key = e.key.toLowerCase();
      if ((e.ctrlKey || e.metaKey) && key === 'z') {
        e.preventDefault();
        e.shiftKey ? redo() : undo();
        return;
      }
      if ((e.key === 'Delete' || e.key === 'Del') && !isEditableTarget(e.target)) {
        e.preventDefault();
        deleteSelectedLyric();
        return;
      }
      if (e.code === 'Space' && !isEditableTarget(e.target)) { e.preventDefault(); togglePlayback(); }
      if (e.code === 'ArrowRight' && !isEditableTarget(e.target)) { currentFrame++; syncAudioToFrame(); render(); }
      if (e.code === 'ArrowLeft' && !isEditableTarget(e.target)) { currentFrame--; syncAudioToFrame(); render(); }
    });
    async function saveRenderedVideo() {
      if (globalSettings.exportFormat === 'mov') {
        renderStatusText = 'MOV / ProRes 4444はRemotion/FFmpeg連携で実装予定です。現在のブラウザ版ではWebM保存のみ対応しています。';
        render();
        return;
      }
      if (isRendering) return;
      isRendering = true;
      renderStatusText = '保存先を選択してください。';
      render();
      let writable = null;
      let url = null;
      try {
        if (window.showSaveFilePicker) {
          const handle = await window.showSaveFilePicker({suggestedName:'lyric-video.webm', types:[{description:'WebM video', accept:{'video/webm':['.webm']}}]});
          writable = await handle.createWritable();
        }
        const blob = await renderVideoBlob((f,total) => {
          renderStatusText = `レンダリング中... ${Math.round((f / total) * 100)}%`;
          if (activeTab === 'output') renderTabs();
        });
        if (writable) {
          await writable.write(blob);
          await writable.close();
        } else {
          url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'lyric-video.webm';
          a.click();
        }
        renderStatusText = '保存が完了しました。';
      } catch (err) {
        renderStatusText = err?.name === 'AbortError' ? '保存をキャンセルしました。' : `保存に失敗しました: ${err?.message || err}`;
      } finally {
        if (url) setTimeout(() => URL.revokeObjectURL(url), 1000);
        isRendering = false;
        render();
      }
    }
    async function renderVideoBlob(onProgress) {
      const originalFrame = currentFrame;
      const canvas = document.createElement('canvas');
      canvas.width = stageW;
      canvas.height = stageH;
      const ctx = canvas.getContext('2d');
      const stream = canvas.captureStream(fps);
      const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
      const recorder = new MediaRecorder(stream, {mimeType, videoBitsPerSecond: globalSettings.exportQuality * 1000000});
      const chunks = [];
      recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
      const stopped = new Promise(resolve => recorder.onstop = resolve);
      recorder.start();
      const total = duration();
      for (let frame = 0; frame <= total; frame++) {
        drawFrame(ctx, frame);
        if (frame % 3 === 0 || frame === total) {
          onProgress(frame, total);
          await wait(0);
        }
        await wait(1000 / fps);
      }
      recorder.stop();
      await stopped;
      currentFrame = originalFrame;
      return new Blob(chunks, {type:'video/webm'});
    }
    function drawFrame(ctx, frame) {
      ctx.clearRect(0,0,stageW,stageH);
      lyrics.filter(l => frame >= l.startFrame && frame < l.endFrame).forEach(block => {
        block = withKeyframes(block, frame);
        const visual = getVisual(block, frame);
        const fontSize = 96 * (Number(block.scale) || 1) * visual.scale;
        const x = stageW / 2 + visual.x * 2;
        const y = stageH / 2 + visual.y * 2;
        const color = visual.color || block.textColor || globalSettings.textColor;
        const drawText = visual.text || block.text;
        const bg = getTextBackgroundColor(block);
        ctx.save();
        ctx.globalAlpha = visual.opacity;
        ctx.translate(x, y);
        ctx.rotate((visual.rotation * Math.PI) / 180);
        ctx.transform(1, 0, Math.tan((visual.skew * Math.PI) / 180), 1, 0, 0);
        ctx.font = `800 ${fontSize}px ${block.font || globalSettings.font}`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.lineJoin = 'round';
        if (bg !== 'transparent') {
          const metrics = ctx.measureText(drawText);
          const paddingX = fontSize * .32;
          const paddingY = fontSize * .14;
          const h = (metrics.actualBoundingBoxAscent || fontSize * .78) + (metrics.actualBoundingBoxDescent || fontSize * .22);
          ctx.fillStyle = bg;
          ctx.fillRect(-metrics.width / 2 - paddingX, -h / 2 - paddingY, metrics.width + paddingX * 2, h + paddingY * 2);
        }
        ctx.shadowColor = block.effect === 'Neon' || block.effect === 'Glow' ? color : 'rgba(0,0,0,.55)';
        ctx.shadowBlur = block.effect === 'Neon' || block.effect === 'Glow' ? 32 : 10;
        ctx.strokeStyle = getOutlineColor(block);
        ctx.lineWidth = getOutlineWidth(block) * 4;
        ctx.fillStyle = color;
        if (getOutlineWidth(block) > 0 && getOutlineColor(block) !== 'transparent') ctx.strokeText(drawText, 0, 0);
        ctx.fillText(drawText, 0, 0);
        ctx.restore();
      });
    }
    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
    render();
  </script>
</body>
</html>
